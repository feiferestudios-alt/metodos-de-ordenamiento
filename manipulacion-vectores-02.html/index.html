<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicios con Vectores Numericos</title>
    <style>
        table td {
            text-align: center;
        }
    </style>
</head>

<body>
    <h4>Ejercicio con Vectores</h4>
    <div>
        <table>
            <tbody>
                <tr>
                    <td>Dimension del arreglo:</td>
                    <td>
                        <select id="select-dimension-arreglo">
                            <option value="4">4</option>
                            <option value="5">5</option>
                            <option value="6">6</option>
                            <option value="7">7</option>
                            <option value="8">8</option>
                            <option value="9">9</option>
                            <option value="10">10</option>
                            <option value="15">15</option>
                            <option value="20">20</option>
                            <option value="25">25</option>
                            <option value="30">30</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td>Ingrese valor a buscar:</td>
                    <td><input type="text" name="" id="id-valor-busqueda" maxlength="4" size="5"></td>
                </tr>
            </tbody>
        </table>
    </div>
    <br>
    <table id="id-table-vector-numerico" border="1" cellspacing="1" cellpadding="1">
        <thead>
            <tr>
                <td colspan="10">Vector numerico de N elementos</td>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>0</td><td>1</td><td>2</td><td>3</td><td>4</td><td>5</td><td>6</td><td>7</td><td>8</td><td>9</td>
            </tr>
            <tr>
                <td>0</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="5"><button id="btn-cargar-vector">Cargar Vector</button></td>
                <td colspan="5"><button id="btn-vaciar-vector">Vaciar Vector</button></td>
            </tr>
            <tr>
                <td colspan="5"><button id="btn-numero-mayor">Numero Mayor</button></td>
                <td colspan="5"><button id="btn-numero-menor">Numero Menor</button></td>
            </tr>
            <tr>
                <td colspan="5"><button id="btn-sumar-valores">Suma de Valores</button></td>
                <td colspan="5"><button id="btn-producto-vector">Producto de Valores</button></td>
            </tr>
            <tr>
                <td colspan="5"><button id="btn-calcular-moda">Moda</button></td>
                <td colspan="5">
                    <button id="btn-calcular-media">Media</button>
                    <button id="btn-calcular-mediana">Mediana</button>
                </td>
            </tr>
            
            <tr>
                <td colspan="10" bgcolor="#eeeeee"><b>Opciones de Ordenamiento y Transformación</b></td>
            </tr>
            <tr>
                <td colspan="5">
                    Sentido:
                    <select id="select-orden-sentido">
                        <option value="ASC">Ascendente</option>
                        <option value="DESC">Descendente</option>
                    </select>
                </td>
                <td colspan="5">
                    Rotaciones: <input type="text" id="id-cant-rotar" value="1" size="3">
                    <select id="select-dir-rotar">
                        <option value="DER">Derecha</option>
                        <option value="IZQ">Izquierda</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td colspan="10">
                    Posición 1: <input type="text" id="id-swap-p1" size="3"> 
                    Posición 2: <input type="text" id="id-swap-p2" size="3">
                    <button id="btn-presentar-vector" style="display:none;"></button>
                    <button id="btn-promedio-vector" style="display:none;"></button>
                </td>
            </tr>
            <tr>
                <td colspan="5"><button id="btn-ordenar-seleccion">Ordenar Selección</button></td>
                <td colspan="5"><button id="btn-ordenar-burbuja">Ordenar Burbuja</button></td>
            </tr>
            <tr>
                <td colspan="5"><button id="btn-ordenar-insercion">Ordenar Inserción</button></td>
                <td colspan="5"><button id="btn-ordenar-fusion">Ordenar Fusión</button></td>
            </tr>
            <tr>
                <td colspan="5"><button id="btn-busqueda-secuencial">Búsqueda Secuencial</button></td>
                <td colspan="5"><button id="btn-busqueda-binaria">Búsqueda Binaria</button></td>
            </tr>
            <tr>
                <td colspan="5"><button id="btn-invertir-vector">Invertir Vector</button></td>
                <td colspan="5"><button id="btn-eliminar-duplicados">Eliminar Duplicados</button></td>
            </tr>
            <tr>
                <td colspan="5"><button id="btn-rotar-vector">Rotar Vector</button></td>
                <td colspan="5"><button id="btn-intercambiar-elementos">Intercambiar Elementos</button></td>
            </tr>
        </tfoot>
    </table>
    <hr>
    <table>
        <thead>
            <tr>
                <td colspan="2">Calculos con vectores </td>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Resultado:</td>
                <td colspan="2"><input type="text" id="id-txt-respuesta" size="70"></td>
            </tr>
        </tbody>
    </table>
    <script src="./js/app.js"></script>
</body>

</html>
